name: Test hardware_collector_lib and system_info_lib

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-hardware-lib:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11']
      fail-fast: false

    runs-on: ${{ matrix.os }}
    name: Test hardware_lib on ${{ matrix.os }} (Python ${{ matrix.python-version }})

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install psutil py-cpuinfo wmi distro

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

    - name: Debug info
      run: |
        echo "Current directory: $(pwd)"
        echo "Python version: $(python --version)"
        echo "PYTHONPATH: $PYTHONPATH"
        echo "OS: ${{ matrix.os }}"
        ls -la
        ls -la hardware_collector_lib/ || echo "hardware_collector_lib folder not found"

    - name: Test hardware_lib CPU detection
      run: python -c "
import sys
import platform
print('Python path:', sys.path)
try:
    from hardware_collector_lib.CPU.get_cpu import choice_get_cpu_function
    print('✅ Hardware lib CPU import successful')
    os_name = platform.system()
    print(f'Testing CPU on {os_name}')
    result = choice_get_cpu_function(os_name)
    print(f'CPU Info: {result}')
    assert result is not None, 'CPU detection failed'
    assert 'cpu_cores' in result, 'Missing cpu_cores'
    assert 'cpu_model' in result, 'Missing cpu_model'
    print('✅ CPU test passed')
except Exception as e:
    print(f'❌ Error in hardware lib CPU test: {e}')
    import traceback
    traceback.print_exc()
    sys.exit(1)
"

    - name: Test hardware_lib GPU detection
      run: python -c "
import sys
import platform
try:
    from hardware_collector_lib.GPU.get_gpu import choice_get_gpu_function
    print('✅ Hardware lib GPU import successful')
    os_name = platform.system()
    print(f'Testing GPU on {os_name}')
    result = choice_get_gpu_function(os_name)
    print(f'GPU Info: {result}')
    print('✅ GPU test passed')
except Exception as e:
    print(f'❌ Error in hardware lib GPU test: {e}')
    import traceback
    traceback.print_exc()
    sys.exit(1)
"

    - name: Test hardware_lib RAM detection
      run: python -c "
import sys
import platform
try:
    from hardware_collector_lib.RAM.get_ram import choice_get_ram_function
    print('✅ Hardware lib RAM import successful')
    os_name = platform.system()
    print(f'Testing RAM on {os_name}')
    result = choice_get_ram_function(os_name)
    print(f'RAM Info: {result}')
    assert result is not None, 'RAM detection failed'
    assert 'ram_total_GB' in result, 'Missing ram_total_GB'
    print('✅ RAM test passed')
except Exception as e:
    print(f'❌ Error in hardware lib RAM test: {e}')
    import traceback
    traceback.print_exc()
    sys.exit(1)
"

    - name: Test hardware_lib main function
      run: python -c "
import sys
try:
    from hardware_collector_lib.main import get_device_info
    print('✅ Hardware lib main import successful')
    result = get_device_info()
    print(f'Hardware device info: {result}')
    assert 'cpu' in result, 'Missing CPU info'
    assert 'gpu' in result, 'Missing GPU info'
    assert 'ram' in result, 'Missing RAM info'
    print('✅ Hardware lib main test passed')
except Exception as e:
    print(f'❌ Error in hardware lib main test: {e}')
    import traceback
    traceback.print_exc()
    sys.exit(1)
"

  test-os-lib:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11']
      fail-fast: false

    runs-on: ${{ matrix.os }}
    name: Test system_info_lib on ${{ matrix.os }} (Python ${{ matrix.python-version }})

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install distro pywin32 wmi psutil

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

    - name: Debug info for OS lib
      run: |
        echo "Current directory: $(pwd)"
        echo "Python version: $(python --version)"
        echo "PYTHONPATH: $PYTHONPATH"
        echo "OS: ${{ matrix.os }}"
        ls -la
        ls -la system_info_lib/ || echo "system_info_lib folder not found"

    - name: Test system_info_lib imports
      run: python -c "
import sys
import platform
print('=' * 60)
print('TESTING SYSTEM_INFO_LIB IMPORTS')
print('=' * 60)
try:
    from system_info_lib.main import get_system_info
    print('✅ get_system_info imported successfully')
    from system_info_lib.orchestrator import Orchestrator
    print('✅ Orchestrator imported successfully')
    from system_info_lib.collectors import get_collector
    print('✅ collectors imported successfully')
    from system_info_lib.formatters import JSONFormatter, YAMLFormatter, XMLFormatter, TableFormatter, HTMLFormatter
    print('✅ formatters imported successfully')
    print('\\n✅ ALL IMPORTS SUCCESSFUL')
except Exception as e:
    print(f'❌ Import error: {e}')
    import traceback
    traceback.print_exc()
    sys.exit(1)
"

    - name: Test system_info_lib basic functionality
      run: python -c "
import sys
import json
import platform
print('=' * 60)
print('TESTING SYSTEM_INFO_LIB BASIC FUNCTIONALITY')
print('=' * 60)
try:
    from system_info_lib.main import get_system_info
    os_name = platform.system()
    print(f'Testing on OS: {os_name}')
    print('\\n📋 TEST 1: Minimal mode')
    result_minimal = get_system_info(mode='minimal', formatter=None)
    print(f'Result type: {type(result_minimal)}')
    print(f'Keys: {list(result_minimal.keys())}')
    print(f'Sample: {json.dumps(result_minimal, indent=2, default=str)}')
    assert result_minimal is not None, 'Minimal mode returned None'
    assert 'os_name' in result_minimal, 'Missing os_name'
    assert 'hostname' in result_minimal, 'Missing hostname'
    assert 'username' in result_minimal, 'Missing username'
    print('✅ Minimal mode test passed')
    print('\\n📋 TEST 2: Standard mode')
    result_standard = get_system_info(mode='standard', formatter=None)
    print(f'Keys count: {len(result_standard.keys())}')
    print(f'Keys: {list(result_standard.keys())}')
    assert len(result_standard.keys()) > len(result_minimal.keys()), 'Standard mode should have more keys than minimal'
    print('✅ Standard mode test passed')
    print('\\n📋 TEST 3: Advanced mode')
    result_advanced = get_system_info(mode='advanced', formatter=None)
    print(f'Keys count: {len(result_advanced.keys())}')
    has_low_level = 'low_level' in result_advanced or any('low' in k.lower() for k in result_advanced.keys())
    has_drivers = 'drivers' in result_advanced or any('driver' in k.lower() for k in result_advanced.keys())
    print(f'Has low_level data: {has_low_level}')
    print(f'Has drivers data: {has_drivers}')
    print('✅ Advanced mode test passed')
    print('\\n✅ ALL BASIC TESTS PASSED')
except Exception as e:
    print(f'❌ Error in basic functionality test: {e}')
    import traceback
    traceback.print_exc()
    sys.exit(1)
"

    - name: Test system_info_lib formatters
      run: python -c "
import sys
import json
print('=' * 60)
print('TESTING SYSTEM_INFO_LIB FORMATTERS')
print('=' * 60)
try:
    from system_info_lib.main import get_system_info
    print('\\n📋 TEST 1: JSON formatter')
    json_result = get_system_info(mode='minimal', formatter='json')
    print(f'JSON output (first 200 chars):')
    print(json_result[:200] + '...')
    json_parsed = json.loads(json_result)
    assert 'os_name' in json_parsed, 'JSON parsing failed'
    print('✅ JSON formatter test passed')
    print('\\n📋 TEST 2: YAML formatter')
    yaml_result = get_system_info(mode='minimal', formatter='yaml')
    print(f'YAML output:')
    print(yaml_result)
    assert 'os_name:' in yaml_result, 'YAML format incorrect'
    print('✅ YAML formatter test passed')
    print('\\n📋 TEST 3: XML formatter')
    xml_result = get_system_info(mode='minimal', formatter='xml')
    print(f'XML output:')
    print(xml_result[:200] + '...')
    assert '<system_info>' in xml_result, 'XML format incorrect'
    assert '<os_name>' in xml_result, 'XML missing os_name tag'
    print('✅ XML formatter test passed')
    print('\\n📋 TEST 4: Table formatter')
    table_result = get_system_info(mode='minimal', formatter='table')
    print(f'Table output:')
    print(table_result)
    assert '+' in table_result and '|' in table_result, 'Table format incorrect'
    print('✅ Table formatter test passed')
    print('\\n📋 TEST 5: HTML formatter')
    html_result = get_system_info(mode='minimal', formatter='html')
    print(f'HTML output (first 200 chars):')
    print(html_result[:200] + '...')
    assert '<!DOCTYPE html>' in html_result, 'HTML format incorrect'
    assert '<table>' in html_result, 'HTML missing table'
    print('✅ HTML formatter test passed')
    print('\\n✅ ALL FORMATTER TESTS PASSED')
except Exception as e:
    print(f'❌ Error in formatters test: {e}')
    import traceback
    traceback.print_exc()
    sys.exit(1)
"

    - name: Test system_info_lib cross-platform compatibility
      run: python -c "
import sys
import platform
print('=' * 60)
print('TESTING CROSS-PLATFORM COMPATIBILITY')
print('=' * 60)
try:
    from system_info_lib.main import get_system_info
    current_os = platform.system()
    print(f'Current OS: {current_os}')
    result = get_system_info(mode='standard', formatter=None)
    if current_os == 'Windows':
        print('Checking Windows-specific fields...')
        assert 'os_edition' in result or 'os_build' in result, 'Missing Windows-specific fields'
    elif current_os == 'Linux':
        print('Checking Linux-specific fields...')
    elif current_os == 'Darwin':
        print('Checking macOS-specific fields...')
    print(f'✅ {current_os} compatibility test passed')
except Exception as e:
    print(f'❌ Error in cross-platform test: {e}')
    import traceback
    traceback.print_exc()
    sys.exit(1)
"

  test-integration:
    needs: [test-hardware-lib, test-os-lib]
    if: success() || failure()
    runs-on: ubuntu-latest
    name: Test integration of both libraries
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psutil py-cpuinfo wmi distro

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

    - name: Test both libraries together
      run: python -c "
import sys
import platform
import json
from datetime import datetime
print('=' * 70)
print('TESTING BOTH LIBRARIES TOGETHER - INTEGRATION TEST')
print('=' * 70)
results = {
    'timestamp': datetime.now().isoformat(),
    'hardware_lib': {'status': 'unknown', 'error': None},
    'system_info_lib': {'status': 'unknown', 'error': None},
    'integration': {'status': 'unknown'}
}
try:
    from hardware_collector_lib.main import get_device_info
    print('\\n✅ hardware_collector_lib imported')
    hw_info = get_device_info()
    print(f'Hardware info keys: {list(hw_info.keys())}')
    results['hardware_lib']['status'] = 'success'
    results['hardware_lib']['data_keys'] = list(hw_info.keys())
except Exception as e:
    print(f'\\n❌ hardware_collector_lib error: {e}')
    results['hardware_lib']['status'] = 'failure'
    results['hardware_lib']['error'] = str(e)
try:
    from system_info_lib.main import get_system_info
    print('✅ system_info_lib imported')
    os_info_minimal = get_system_info(mode='minimal', formatter=None)
    os_info_standard = get_system_info(mode='standard', formatter=None)
    os_info_advanced = get_system_info(mode='advanced', formatter=None)
    print(f'Minimal OS info keys: {list(os_info_minimal.keys())}')
    print(f'Standard OS info keys count: {len(os_info_standard.keys())}')
    print(f'Advanced OS info keys count: {len(os_info_advanced.keys())}')
    results['system_info_lib']['status'] = 'success'
    results['system_info_lib']['minimal_keys'] = list(os_info_minimal.keys())
    results['system_info_lib']['standard_count'] = len(os_info_standard.keys())
    results['system_info_lib']['advanced_count'] = len(os_info_advanced.keys())
except Exception as e:
    print(f'❌ system_info_lib error: {e}')
    results['system_info_lib']['status'] = 'failure'
    results['system_info_lib']['error'] = str(e)
if results['hardware_lib']['status'] == 'success' and results['system_info_lib']['status'] == 'success':
    print('\\n' + '=' * 70)
    print('CREATING COMBINED SYSTEM REPORT')
    print('=' * 70)
    try:
        hw = get_device_info()
        os_info = get_system_info(mode='standard', formatter=None)
        combined = {
            'timestamp': datetime.now().isoformat(),
            'system': {
                'os': platform.system(),
                'release': platform.release(),
                'version': platform.version(),
                'machine': platform.machine(),
                'processor': platform.processor(),
                'python_version': platform.python_version()
            },
            'hardware': hw,
            'operating_system': os_info
        }
        with open('combined_system_report.json', 'w') as f:
            json.dump(combined, f, indent=2, default=str)
        print('✅ Combined report created successfully')
        print(f'Report saved to: combined_system_report.json')
        print('\\n📊 COMBINED SYSTEM SUMMARY:')
        print(f"OS: {os_info.get('os_name', 'Unknown')} {os_info.get('os_version', '')}")
        print(f"Hostname: {os_info.get('hostname', 'Unknown')}")
        print(f"Username: {os_info.get('username', 'Unknown')}")
        print(f"CPU: {hw.get('cpu', {}).get('cpu_model', 'Unknown')}")
        print(f"CPU Cores: {hw.get('cpu', {}).get('cpu_cores', 'Unknown')}")
        print(f"RAM: {hw.get('ram', {}).get('ram_total_GB', 'Unknown')} GB")
        results['integration']['status'] = 'success'
    except Exception as e:
        print(f'❌ Error creating combined report: {e}')
        results['integration']['status'] = 'failure'
        results['integration']['error'] = str(e)
else:
    print('\\n⚠️ Cannot create combined info - one or both libraries failed')
    results['integration']['status'] = 'skipped'
with open('integration_test_results.json', 'w') as f:
    json.dump(results, f, indent=2)
print('\\n' + '=' * 70)
print('TEST SUMMARY:')
print(f"hardware_lib: {results['hardware_lib']['status']}")
print(f"system_info_lib: {results['system_info_lib']['status']}")
print(f"integration: {results['integration']['status']}")
print('=' * 70)
if results['hardware_lib']['status'] == 'failure' and results['system_info_lib']['status'] == 'failure':
    print('❌ Both libraries failed!')
    sys.exit(1)
else:
    print('✅ Tests completed (partial success acceptable)')
"

    - name: Upload integration test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-logs
        path: |
          integration_test_results.json
          combined_system_report.json
        if-no-files-found: warn

  upload-logs:
    if: always()
    needs: [test-hardware-lib, test-os-lib, test-integration]
    runs-on: ubuntu-latest
    steps:
    - name: Upload all test logs
      uses: actions/upload-artifact@v4
      with:
        name: all-test-logs
        path: |
          *.log
          error_fallback.log
          **/*.log
          **/*.json
          **/combined_system_report.json
        if-no-files-found: warn

    - name: Final status
      run: |
        echo "📊 FINAL TEST SUMMARY:"
        echo "================================"
        echo "hardware_lib tests: ${{ needs.test-hardware-lib.result }}"
        echo "system_info_lib tests: ${{ needs.test-os-lib.result }}"
        echo "integration tests: ${{ needs.test-integration.result }}"
        echo "================================"
        
        if [ "${{ needs.test-hardware-lib.result }}" = "success" ] && [ "${{ needs.test-os-lib.result }}" = "success" ]; then
          echo "✅ All tests passed successfully!"
          echo "🎉 Both libraries are working correctly!"
        elif [ "${{ needs.test-hardware-lib.result }}" = "success" ] || [ "${{ needs.test-os-lib.result }}" = "success" ]; then
          echo "⚠️ Partial success - one library passed, one failed"
          echo "Check the logs above for details"
        else
          echo "❌ Both libraries failed!"
          echo "Please check the errors above"
          exit 1
        fi