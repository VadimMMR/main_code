name: Check Docker Hub Images

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-docker-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [
          "dayg0555/hardware_collector_lib:latest",
          "dayg0555/system_info_lib:latest"
        ]
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if ${{ matrix.image }} exists on Docker Hub
        id: check_image
        run: |
          echo "🔍 Проверка образа ${{ matrix.image }}..."
          if docker manifest inspect ${{ matrix.image }} > /dev/null 2>&1; then
            echo "✅ Образ ${{ matrix.image }} существует!"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Образ ${{ matrix.image }} не найден!"
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Test pulling ${{ matrix.image }}
        if: steps.check_image.outputs.status == 'success'
        run: |
          echo "🐳 Тестовый pull образа ${{ matrix.image }}..."
          docker pull ${{ matrix.image }}
          echo "✅ Образ успешно скачан"

      - name: Create test container from ${{ matrix.image }}
        if: steps.check_image.outputs.status == 'success'
        run: |
          echo "🚀 Создание тестового контейнера из ${{ matrix.image }}..."
          docker create --name test ${{ matrix.image }}
          docker rm test
          echo "✅ Контейнер успешно создан"

  check-main-project:
    needs: check-docker-images
    runs-on: ubuntu-latest
    if: success() || failure()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if all images are available
        run: |
          echo "📋 Проверка всех необходимых образов:"
          
          # Проверяем hardware_collector_lib
          if docker manifest inspect dayg0555/hardware_collector_lib:latest > /dev/null 2>&1; then
            echo "✅ hardware_collector_lib: найден"
            HW_STATUS="success"
          else
            echo "❌ hardware_collector_lib: НЕ НАЙДЕН"
            HW_STATUS="failure"
          fi
          
          # Проверяем system_info_lib
          if docker manifest inspect dayg0555/system_info_lib:latest > /dev/null 2>&1; then
            echo "✅ system_info_lib: найден"
            OS_STATUS="success"
          else
            echo "❌ system_info_lib: НЕ НАЙДЕН"
            OS_STATUS="failure"
          fi
          
          echo "hw_status=$HW_STATUS" >> $GITHUB_OUTPUT
          echo "os_status=$OS_STATUS" >> $GITHUB_OUTPUT
          
          if [ "$HW_STATUS" = "failure" ] && [ "$OS_STATUS" = "failure" ]; then
            echo "❌ КРИТИЧЕСКАЯ ОШИБКА: Ни один из образов не найден!"
            exit 1
          fi
        id: check_status

      - name: Build main project (if all images available)
        if: steps.check_status.outputs.hw_status == 'success' && steps.check_status.outputs.os_status == 'success'
        run: |
          echo "🏗️ Все образы найдены! Сборка основного проекта..."
          echo "FROM dayg0555/hardware_collector_lib:latest AS hw_lib" > Dockerfile.test
          echo "FROM dayg0555/system_info_lib:latest AS os_lib" >> Dockerfile.test
          echo "FROM python:3.11-slim" >> Dockerfile.test
          echo "WORKDIR /app" >> Dockerfile.test
          echo "COPY --from=hw_lib /app/ /app/hardware_collector_lib/" >> Dockerfile.test
          echo "COPY --from=os_lib /app/ /app/system_info_lib/" >> Dockerfile.test
          echo "COPY requirements.txt ." >> Dockerfile.test
          echo "RUN pip install --no-cache-dir -r requirements.txt" >> Dockerfile.test
          echo "COPY main.py ." >> Dockerfile.test
          echo "ENV PYTHONPATH=/app" >> Dockerfile.test
          echo "CMD [\"python\", \"main.py\"]" >> Dockerfile.test
          
          docker build -f Dockerfile.test -t test-project .
          echo "✅ Пробная сборка прошла успешно!"

      - name: Send notification on failure
        if: failure()
        run: |
          echo "⚠️ ВНИМАНИЕ! Проблемы с образами на Docker Hub!"
          echo "Проверьте следующие образы:"
          if [ "${{ steps.check_status.outputs.hw_status }}" = "failure" ]; then
            echo "  - dayg0555/hardware_collector_lib:latest"
          fi
          if [ "${{ steps.check_status.outputs.os_status }}" = "failure" ]; then
            echo "  - dayg0555/system_info_lib:latest"
          fi

      - name: Send success notification
        if: success()
        run: |
          echo "🎉 Все образы на Docker Hub доступны!"
          echo "hardware_collector_lib: ✅"
          echo "system_info_lib: ✅"